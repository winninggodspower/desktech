{% load static %}

<div class="relative bg-[#B1F20E7A] py-11 px-16 min-h-[180px] hover:shadow-lg transition-shadow duration-300">
    <div class="absolute -top-2 -start-5 size-[76px] bg-[#30C392E5] rounded-full flex items-center justify-center shadow-md">
       <img src="{% static icon_path %}" alt="{{ title }} icon" >
    </div>
    <h3 class="text-2xl font-semibold text-custom-dark mb-1">{{ title }}</h3>
    <p class="text-base font-light ">{{ description }}</p>
</div>
